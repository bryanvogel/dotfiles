# Smart pane switching with awareness of Vim splits (Shift+hjkl)
vim_pattern='([^ ]+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +${vim_pattern}$'"
bind-key -n 'H' if-shell "$is_vim" 'send-keys H' 'select-pane -L'
bind-key -n 'J' if-shell "$is_vim" 'send-keys J' 'select-pane -D'
bind-key -n 'K' if-shell "$is_vim" 'send-keys K' 'select-pane -U'
bind-key -n 'L' if-shell "$is_vim" 'send-keys L' 'select-pane -R'

# Split panes
bind-key '\' split-window -h -c '#{pane_current_path}'
bind-key '-' split-window -v -c '#{pane_current_path}'

bind-key -T copy-mode-vi 'H' select-pane -L
bind-key -T copy-mode-vi 'J' select-pane -D
bind-key -T copy-mode-vi 'K' select-pane -U
bind-key -T copy-mode-vi 'L' select-pane -R

# Mouse support
set -g mouse on

# Start numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Status bar - Everforest dark hard palette
set -g status-style "bg=#2b3339,fg=#d3c6aa"
set -g status-left "#[bg=#a7c080,fg=#2b3339,bold] #S #[bg=#2b3339] "
set -g status-right "#[fg=#d3c6aa]%H:%M #[bg=#a7c080,fg=#2b3339,bold] #h "
set -g window-status-format "#[fg=#859289] #I:#W "
set -g window-status-current-format "#[bg=#3d484d,fg=#a7c080,bold] #I:#W "
set -g pane-border-style "fg=#4f585e"
set -g pane-active-border-style "fg=#a7c080"
set -g message-style "bg=#3d484d,fg=#d3c6aa"
